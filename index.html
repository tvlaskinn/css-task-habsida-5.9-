<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Css task 5.9</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://www.fontsquirrel.com/fonts/barlow?family=Barlow:wght@400;600&display=swap" rel="stylesheet">


</head>
<body>
    <div class="container">
        <h1 class="title"> Get into it today</h1>
        <p class="subtitle"> What type of investor are you? </p>
    
        <form class="form">
            <div class="radio group">
                <label>
                    <input type="radio" name="investor" value="individual">
                    <span> Individual</span>
                </label>
                <label>
                    <input type="radio" name="investor" value="business">
                    <span> Business</span>
                </label>
                <label>
                    <input type="radio" name="investor" value="institutional">
                    <span>Institutional</span>
                </label>
            </div>
         <br>

            <input type="text" placeholder="Full Name">
            <input type="email" placeholder="Email">
            <input type="tel" placeholder="Phone">

         <div class="social-buttons">
            <button type="button" class="btn fb"> Sigh up with Facebook</button>
            <button type="button" class="btn in"> Sigh  up with LinkedIn</button>
         </div>

         <button type="submit" class="btn create">Create Account</button>
        </form>
    </div>
</body>
</html>
